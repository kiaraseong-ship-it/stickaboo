<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Stickaboo Internal Print Tool</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="customizer.css" />
</head>

<body>
  <div class="page-width">
    <div class="flex-box" data-custom-root data-section-type="customizer"
      data-placeholder="images/small-undertheocean.png">
      <!-- 🔹 PREVIEW (그대로 유지) -->
      <div class="print-capture">
        <div class="preview-wrapper">
          <img class="preview-image" />
          <div id="overlay-container"></div>
        </div>
      </div>

      <!-- 🔹 OPTIONS (🔥 네가 올린 코드, 그대로) -->
      <div class="selection-wrapper">
        <div class="customizer-container">
          <!-- ⬇️ 여기부터 네 코드 그대로 -->
          <!-- Size Section -->
          <div class="customizer-section" id="size-section">
            <p class="section-title">1. Choose Size</p>
            <section class="options options-size">
              <button class="option-btn size-btn" data-size="small">
                <label>Small</label>
                <p>52 pcs</p>
              </button>
              <button class="option-btn size-btn" data-size="medium">
                <label>Medium</label>
                <p>36 pcs</p>
              </button>
              <button class="option-btn size-btn" data-size="large">
                <label>Large</label>
                <p>13 pcs</p>
              </button>
              <button class="option-btn size-btn" data-size="sml-mix">
                <label>S+M+L Mix</label>
                <p>34 pcs</p>
              </button>
              <button class="option-btn size-btn" data-size="ml-mix">
                <label>M+L Mix</label>
                <p>20 pcs</p>
              </button>
            </section>
          </div>

          <!-- Theme Section -->
          <div class="customizer-section" id="theme-section">
            <p class="section-title">2. Choose Theme</p>

            <section class="options options-theme">
              <button class="option-btn theme-btn" data-theme="undertheocean">
                <img src="images/undertheocean-icon.png" alt="undertheocean" />
              </button>

              <button class="option-btn theme-btn" data-theme="animal">
                <img src="images/animal-icon.png" alt="animal" />
              </button>

              <button class="option-btn theme-btn" data-theme="dino">
                <img src="images/dino-icon.png" alt="dino" />
              </button>

              <button class="option-btn theme-btn" data-theme="unicorn">
                <img src="images/unicorn-icon.png" alt="unicorn" />
              </button>

              <button class="option-btn theme-btn" data-theme="space">
                <img src="images/space-icon.png" alt="space" />
              </button>

              <button class="option-btn theme-btn" data-theme="cuteicon">
                <img src="images/cuteicon-icon.png" alt="cuteicon" />
              </button>

              <button class="option-btn theme-btn" data-theme="vehicles">
                <img src="images/vehicles-icon.png" alt="vehicles" />
              </button>

              <button class="option-btn theme-btn" data-theme="pastel mood">
                <img src="images/pastelmood-icon.png" alt="pastelmood" />
              </button>

              <button class="option-btn theme-btn" data-theme="nameonly">
                <img src="images/nameonly-icon.png" alt="nameonly" />
              </button>
            </section>
          </div>

          <!-- Text Section -->
          <div class="customizer-section" id="text-section">
            <p class="section-title">3. Add your text</p>
            <section class="inputs">
              <input type="text" id="user-text" class="text-input" placeholder="First Name" />
              <input type="text" id="user-text-last-name" class="text-input" placeholder="Last Name (Or Leave Blank)" />
            </section>
          </div>

          <!-- Color Section -->
          <div class="customizer-section" id="font-color-section">
            <p class="section-title">
              4. Choose a Font Color
              <span class="font-color-note">(White shown with outline for visibility only)</span>
            </p>

            <section class="options options-font-color">
              <button class="option-btn color-btn active" data-color="#000000" title="Black">
                <span class="color-preview" style="background: #000000"></span>
              </button>

              <button class="option-btn color-btn" data-color="#FFFFFF" title="White">
                <span class="color-preview"></span>
              </button>

              <button class="option-btn color-btn" data-color="#1F3A5F" title="Navy">
                <span class="color-preview" style="background: #1f3a5f"></span>
              </button>

              <button class="option-btn color-btn" data-color="#43BBEC" title="Sky Blue">
                <span class="color-preview" style="background: #43bbec"></span>
              </button>

              <button class="option-btn color-btn" data-color="#2F6B4F" title="Forest Green">
                <span class="color-preview" style="background: #2f6b4f"></span>
              </button>

              <button class="option-btn color-btn" data-color="#F5A3B7" title="Soft Pink">
                <span class="color-preview" style="background: #f5a3b7"></span>
              </button>

              <button class="option-btn color-btn" data-color="#8B5E3C" title="Warm Brown">
                <span class="color-preview" style="background: #8b5e3c"></span>
              </button>
            </section>
          </div>

          <!-- 🔥 SAVE BUTTON (추가만 함) -->
          <button id="save-png-btn" class="save-btn">Save PNG ×4</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="customizer.js?v=2"></script>
  <script src="export.js?v=2"></script>
</body>

</html>
